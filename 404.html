
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Toolify</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Inter, Arial, sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0f172a;
            color:white;
            text-align:center;
            padding:20px;
        }

        .container{
            max-width:600px;
        }

        h1{
            font-size:120px;
            margin-bottom:10px;
        }

        h2{
            font-size:32px;
            margin-bottom:20px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:30px;
            line-height:1.6;
        }

        .btn{
            display:inline-block;
            padding:12px 24px;
            background:#3b82f6;
            color:white;
            text-decoration:none;
            border-radius:10px;
            font-weight:600;
        }

        .btn:hover{
            opacity:.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>

        <h2>Tool Not Found</h2>

        <p>
            The page you're looking for doesn't exist,
            may have been moved, or the URL is incorrect.
        </p>

        <a href="https://mohakdev1220.github.io/facts" class="btn">Back to Home</a>
    </div>
</body>
</html>
