<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mohak Developer</title>
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Helvetica, Arial, sans-serif;
        }

        .post-container {
            background-color: white;
            width: 95%; /* Responsive width */
            max-width: 600px; /* Standard social post width */
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .post-header {
            padding: 12px;
            font-weight: bold;
            border-bottom: 1px solid #ddd;
        }

        .video-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1; /* Modern way to force square shape */
            background-color: black;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures video fills the square */
        }
    </style>
</head>
<body>

    <div class="post-container">
        <div class="post-header">
            Mohak's Video Post
        </div>

        <div class="video-wrapper">
            <video controls>
                <source src="kalu.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </div> </body>
</html>
