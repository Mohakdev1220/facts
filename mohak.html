<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facebook Video Post</title>
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: Helvetica, Arial, sans-serif;
        }

        .post-container {
            background-color: white;
            width: 100%;
            max-width: 1080px; /* Limits width to the video size */
            border-radius: 8px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .post-header {
            padding: 12px;
            font-weight: bold;
            display: flex;
            align-items: center;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            /* Forces 1:1 Aspect Ratio */
            padding-top: 100%; 
            background-color: black;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .post-footer {
            padding: 12px;
            border-top: 1px solid #e4e6eb;
            color: #65676b;
        }
    </style>
</head>
<body>

    <div class="post-container">
        <div class="post-header">
            Mohak's Video Post
        </div>

        <div class="video-wrapper">
            <video controls>
                <source src="kalu.mp4" type="video/mp4">
                
            </video>
        </div>

        <div class="post-footer">
            Like · Comment · Share
        </div>
    </div>

</body>
</html>
