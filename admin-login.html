<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facts CMS - Admin Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 400px;
            width: 100%;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 8px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .google-btn {
            width: 100%;
            padding: 12px;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .google-btn:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .google-btn.loading {
            opacity: 0.6;
            pointer-events: none;
        }

        .google-icon {
            width: 20px;
            height: 20px;
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.error {
            background: #fee;
            color: #c00;
            border: 1px solid #fcc;
            display: block;
        }

        .alert.success {
            background: #efe;
            color: #0a0;
            border: 1px solid #cfc;
            display: block;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
            font-size: 12px;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>📚 Facts CMS</h1>
            <p>Manage 10,000+ Facts</p>
        </div>

        <div class="alert" id="alert"></div>

        <button class="google-btn" id="googleLoginBtn">
            <svg class="google-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span id="btnText">Sign in with Google</span>
            <div class="loader" id="loader"></div>
        </button>

        <div class="divider">Only admins can access this panel</div>

        <p style="text-align: center; color: #999; font-size: 12px; margin-top: 20px;">
            🔒 Your Google account will be verified against our admin list
        </p>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ⚠️ REPLACE WITH YOUR FIREBASE CONFIG
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDJANDEn9IdMFNEvKClOofHTmX64IsSyqw",
  authDomain: "dailymemo-92398.firebaseapp.com",
  projectId: "dailymemo-92398",
  storageBucket: "dailymemo-92398.firebasestorage.app",
  messagingSenderId: "707078957755",
  appId: "1:707078957755:web:5027f3cac6a4590059579e",
  measurementId: "G-21EY99C4ZK"
};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        // ⚠️ REPLACE WITH YOUR ADMIN EMAILS
        const ADMIN_EMAILS = [
            "mohakchoubey@gmail.com",
            "prernachoubey81@gmail.com"
        ];

        const googleLoginBtn = document.getElementById('googleLoginBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const alert = document.getElementById('alert');

        // Check if already logged in
        onAuthStateChanged(auth, (user) => {
            if (user && ADMIN_EMAILS.includes(user.email)) {
                // Redirect to dashboard
                window.location.href = './admin-dashboard.html';
            }
        });

        // Google Sign-In
        googleLoginBtn.addEventListener('click', async () => {
            try {
                loader.classList.add('show');
                btnText.textContent = 'Signing in...';
                googleLoginBtn.disabled = true;

                const result = await signInWithPopup(auth, googleProvider);
                const user = result.user;

                // Check if user is admin
                if (!ADMIN_EMAILS.includes(user.email)) {
                    await auth.signOut();
                    throw new Error(`❌ Not authorized. Your email (${user.email}) is not in the admin list.`);
                }

                // Success
                showAlert(`✅ Welcome, ${user.displayName}!`, 'success');
                setTimeout(() => {
                    window.location.href = './admin-dashboard.html';
                }, 1500);

            } catch (error) {
                console.error("Login Error:", error);
                showAlert(error.message, 'error');
                loader.classList.remove('show');
                btnText.textContent = 'Sign in with Google';
                googleLoginBtn.disabled = false;
            }
        });

        function showAlert(message, type) {
            alert.textContent = message;
            alert.className = `alert ${type}`;
        }
    </script>
</body>
</html>
