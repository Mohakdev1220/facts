<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Facts CMS - Admin Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-600: #4b5563;
            --gray-800: #1f2937;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--gray-50);
            color: var(--gray-800);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* HEADER */
        header {
            background: white;
            border-bottom: 1px solid var(--gray-200);
            padding: 20px 0;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .logo {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
        }

        .logout-btn {
            padding: 8px 16px;
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: #dc2626;
        }

        /* MAIN CONTENT */
        main {
            padding: 30px 20px;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--gray-800);
        }

        /* TABS */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--gray-200);
        }

        .tab {
            padding: 12px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: var(--gray-600);
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
            margin-bottom: -2px;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* FORMS */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--gray-800);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        /* IMAGE UPLOAD */
        .image-upload {
            border: 2px dashed var(--gray-200);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--gray-50);
        }

        .image-upload:hover {
            border-color: var(--primary);
            background: #f0f4ff;
        }

        .image-upload.dragover {
            border-color: var(--primary);
            background: #f0f4ff;
        }

        .image-upload-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .image-upload-text {
            font-size: 14px;
            color: var(--gray-600);
        }

        .image-preview {
            width: 100%;
            max-width: 300px;
            border-radius: 8px;
            margin-top: 15px;
        }

        /* BUTTONS */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background: var(--primary-dark);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn:disabled {
            opacity: 0.6;
            pointer-events: none;
        }

        /* TABLES */
        .table-wrapper {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--gray-50);
            padding: 12px;
            text-align: left;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            color: var(--gray-600);
            border-bottom: 1px solid var(--gray-200);
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--gray-200);
            font-size: 14px;
        }

        tr:hover {
            background: var(--gray-50);
        }

        .fact-title {
            font-weight: 600;
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-published {
            background: #d1fae5;
            color: #065f46;
        }

        .badge-draft {
            background: #fef3c7;
            color: #92400e;
        }

        /* SEARCH & FILTER */
        .search-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--gray-200);
            border-radius: 6px;
            font-size: 14px;
        }

        /* ALERTS */
        .alert {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .alert.show {
            display: block;
        }

        .alert.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .alert.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        .alert.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }

        /* MODAL */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--gray-800);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* LOADING */
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            header .container {
                flex-direction: column;
                gap: 15px;
            }

            .form-grid {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 12px;
            }

            th, td {
                padding: 8px;
            }

            .fact-title {
                max-width: 150px;
            }
        }
    </style>
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="container">
            <div class="logo">📚 Facts CMS</div>
            <div class="header-actions">
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <div>
                        <div id="userName">Loading...</div>
                        <small id="userEmail" style="color: #666;"></small>
                    </div>
                </div>
                <button class="logout-btn" id="logoutBtn">Logout</button>
            </div>
        </div>
    </header>

    <!-- MAIN CONTENT -->
    <main>
        <div class="container">
            <h1 class="section-title">Dashboard</h1>

            <div class="alert" id="alert"></div>

            <!-- TABS -->
            <div class="tabs">
                <button class="tab active" data-tab="facts">📊 Facts</button>
                <button class="tab" data-tab="add-fact">➕ Add Fact</button>
                <button class="tab" data-tab="categories">🏷️ Categories</button>
                <button class="tab" data-tab="analytics">📈 Analytics</button>
            </div>

            <!-- TAB 1: FACTS LIST -->
            <div class="tab-content active" id="facts-tab">
                <div class="search-bar">
                    <input type="text" id="searchFacts" placeholder="Search facts by title...">
                    <select id="filterCategory">
                        <option value="">All Categories</option>
                    </select>
                </div>

                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Title</th>
                                <th>Category</th>
                                <th>Status</th>
                                <th>Views</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="factsTable">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 30px; color: #999;">
                                    Loading facts...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- TAB 2: ADD FACT -->
            <div class="tab-content" id="add-fact-tab">
                <div style="background: white; padding: 30px; border-radius: 8px;">
                    <h2 style="margin-bottom: 20px;">Add New Fact</h2>

                    <form id="addFactForm">
                        <div class="form-group">
                            <label>Title *</label>
                            <input type="text" id="factTitle" required placeholder="e.g., Honey never spoils...">
                        </div>

                        <div class="form-group">
                            <label>Description *</label>
                            <textarea id="factDescription" required placeholder="Detailed fact description..."></textarea>
                        </div>

                        <div class="form-grid">
                            <div class="form-group">
                                <label>Category *</label>
                                <select id="factCategory" required>
                                    <option value="">Select Category</option>
                                </select>
                            </div>

                            <div class="form-group">
                                <label>Animation Type</label>
                                <select id="factAnimation">
                                    <option value="fade-in">Fade In</option>
                                    <option value="slide-up">Slide Up</option>
                                    <option value="zoom-in">Zoom In</option>
                                    <option value="bounce">Bounce</option>
                                </select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Image</label>
                            <div class="image-upload" id="imageUpload">
                                <div class="image-upload-icon">📸</div>
                                <div class="image-upload-text">Click or drag image here</div>
                            </div>
                            <img id="imagePreview" class="image-preview" style="display: none;">
                        </div>

                        <div class="form-group">
                            <label>Tags (comma-separated)</label>
                            <input type="text" id="factTags" placeholder="e.g., honey, insects, food">
                        </div>

                        <div class="form-group">
                            <label style="display: flex; align-items: center; gap: 8px;">
                                <input type="checkbox" id="factPublished" checked style="width: auto;">
                                Publish immediately
                            </label>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%;">
                            <span id="submitBtnText">Add Fact</span>
                            <span class="spinner" style="display: none;" id="submitSpinner"></span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- TAB 3: CATEGORIES -->
            <div class="tab-content" id="categories-tab">
                <div style="display: grid; gap: 30px;">
                    <div style="background: white; padding: 30px; border-radius: 8px;">
                        <h2 style="margin-bottom: 20px;">Add Category</h2>
                        <form id="addCategoryForm">
                            <div class="form-group">
                                <label>Category Name *</label>
                                <input type="text" id="categoryName" required placeholder="e.g., Flight and Cabin Crew">
                            </div>
                            <div class="form-group">
                                <label>Emoji</label>
                                <input type="text" id="categoryEmoji" placeholder="✈️">
                            </div>
                            <div class="form-group">
                                <label>Description</label>
                                <textarea id="categoryDescription" placeholder="Category description..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary">Add Category</button>
                        </form>
                    </div>

                    <div style="background: white; padding: 30px; border-radius: 8px;">
                        <h2 style="margin-bottom: 20px;">Existing Categories</h2>
                        <div class="table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th>Name</th>
                                        <th>Facts</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="categoriesTable">
                                    <tr>
                                        <td colspan="3" style="text-align: center; padding: 30px; color: #999;">
                                            Loading categories...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TAB 4: ANALYTICS -->
            <div class="tab-content" id="analytics-tab">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px;">
                    <div style="background: white; padding: 20px; border-radius: 8px; border-left: 4px solid var(--primary);">
                        <div style="font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 10px;">Total Facts</div>
                        <div style="font-size: 32px; font-weight: 700; color: var(--primary);" id="statFacts">-</div>
                    </div>
                    <div style="background: white; padding: 20px; border-radius: 8px; border-left: 4px solid var(--success);">
                        <div style="font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 10px;">Total Categories</div>
                        <div style="font-size: 32px; font-weight: 700; color: var(--success);" id="statCategories">-</div>
                    </div>
                    <div style="background: white; padding: 20px; border-radius: 8px; border-left: 4px solid var(--warning);">
                        <div style="font-size: 12px; color: #666; text-transform: uppercase; margin-bottom: 10px;">Total Views</div>
                        <div style="font-size: 32px; font-weight: 700; color: var(--warning);" id="statViews">-</div>
                    </div>
                </div>

                <div style="background: white; padding: 20px; border-radius: 8px;">
                    <h3 style="margin-bottom: 20px;">Top 10 Facts</h3>
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th>Title</th>
                                    <th>Views</th>
                                </tr>
                            </thead>
                            <tbody id="topFactsTable">
                                <tr>
                                    <td colspan="2" style="text-align: center; padding: 30px; color: #999;">
                                        Loading...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- SCRIPTS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/+esm';

        // ⚠️ REPLACE WITH YOUR CONFIG
        // For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDJANDEn9IdMFNEvKClOofHTmX64IsSyqw",
  authDomain: "dailymemo-92398.firebaseapp.com",
  projectId: "dailymemo-92398",
  storageBucket: "dailymemo-92398.firebasestorage.app",
  messagingSenderId: "707078957755",
  appId: "1:707078957755:web:5027f3cac6a4590059579e",
  measurementId: "G-21EY99C4ZK"
};
        const SUPABASE_URL = "https://gscsyojhrmzdqejycscl.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdzY3N5b2pocm16ZHFlanljc2NsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM0OTU4OTcsImV4cCI6MjA5OTA3MTg5N30.n_oNZeRxThOwusoLmYCPNlsFKJQQcH-qpvrZShYKMZA";
        const ADMIN_EMAILS = ["mohakchoubey@gmail.com"];

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Store globally for event listeners
        window.auth = auth;
        window.supabase = supabase;

        let allFacts = [];
        let allCategories = [];

        // Check auth on load
        onAuthStateChanged(auth, async (user) => {
            if (!user || !ADMIN_EMAILS.includes(user.email)) {
                window.location.href = './admin-login.html';
                return;
            }

            // Update user info
            document.getElementById('userName').textContent = user.displayName || 'Admin';
            document.getElementById('userEmail').textContent = user.email;
            document.getElementById('userAvatar').textContent = (user.displayName || user.email)[0].toUpperCase();

            // Load data
            await loadCategories();
            await loadFacts();
            await loadAnalytics();
        });

        // LOGOUT
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            window.location.href = './admin-login.html';
        });

        // TAB NAVIGATION
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById(`${tabName}-tab`).classList.add('active');
            });
        });

        // LOAD CATEGORIES
        async function loadCategories() {
            try {
                const { data, error } = await supabase
                    .from('categories')
                    .select('*')
                    .order('name');

                if (error) throw error;
                allCategories = data;

                // Populate dropdowns
                const selects = ['factCategory', 'filterCategory'];
                selects.forEach(id => {
                    const select = document.getElementById(id);
                    select.innerHTML = id === 'filterCategory' 
                        ? '<option value="">All Categories</option>'
                        : '<option value="">Select Category</option>';
                    data.forEach(cat => {
                        const option = document.createElement('option');
                        option.value = cat.id;
                        option.textContent = `${cat.emoji || ''} ${cat.name}`;
                        select.appendChild(option);
                    });
                });

                // Load categories table
                await loadCategoriesTable();
            } catch (error) {
                showAlert(`Error loading categories: ${error.message}`, 'error');
            }
        }

        // LOAD FACTS
        async function loadFacts() {
            try {
                const { data, error } = await supabase
                    .from('facts')
                    .select('*, categories:category_id (name, emoji)')
                    .order('created_at', { ascending: false });

                if (error) throw error;
                allFacts = data;
                renderFactsTable();
            } catch (error) {
                showAlert(`Error loading facts: ${error.message}`, 'error');
            }
        }

        // RENDER FACTS TABLE
        function renderFactsTable() {
            const table = document.getElementById('factsTable');
            const searchTerm = document.getElementById('searchFacts').value.toLowerCase();
            const categoryId = document.getElementById('filterCategory').value;

            let filtered = allFacts.filter(fact => {
                const titleMatch = fact.title.toLowerCase().includes(searchTerm);
                const categoryMatch = !categoryId || fact.category_id == categoryId;
                return titleMatch && categoryMatch;
            });

            if (filtered.length === 0) {
                table.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px; color: #999;">No facts found</td></tr>';
                return;
            }

            table.innerHTML = filtered.map(fact => `
                <tr>
                    <td class="fact-title">${fact.title}</td>
                    <td>${fact.categories?.emoji} ${fact.categories?.name}</td>
                    <td><span class="badge ${fact.is_published ? 'badge-published' : 'badge-draft'}">${fact.is_published ? 'Published' : 'Draft'}</span></td>
                    <td>${fact.views || 0}</td>
                    <td>
                        <button class="btn btn-small" onclick="editFact('${fact.id}')">Edit</button>
                        <button class="btn btn-small btn-danger" onclick="deleteFact('${fact.id}')">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        // EDIT FACT
        window.editFact = async (id) => {
            const fact = allFacts.find(f => f.id === id);
            if (!fact) return;

            document.getElementById('factTitle').value = fact.title;
            document.getElementById('factDescription').value = fact.description;
            document.getElementById('factCategory').value = fact.category_id;
            document.getElementById('factAnimation').value = fact.animation_type;
            document.getElementById('factPublished').checked = fact.is_published;
            document.getElementById('factTags').value = (fact.tags || []).join(', ');

            if (fact.image_url) {
                document.getElementById('imagePreview').src = fact.image_url;
                document.getElementById('imagePreview').style.display = 'block';
            }

            document.querySelector('.tab[data-tab="add-fact"]').textContent = '✏️ Edit Fact';
            document.querySelector('[data-tab="add-fact"]').click();

            document.getElementById('addFactForm').onsubmit = async (e) => {
                e.preventDefault();
                await updateFact(id);
                document.querySelector('.tab[data-tab="add-fact"]').textContent = '➕ Add Fact';
            };
        };

        // UPDATE FACT
        async function updateFact(id) {
            const spinner = document.getElementById('submitSpinner');
            const btnText = document.getElementById('submitBtnText');

            try {
                spinner.style.display = 'inline-block';
                btnText.textContent = 'Updating...';

                const updates = {
                    title: document.getElementById('factTitle').value,
                    description: document.getElementById('factDescription').value,
                    category_id: parseInt(document.getElementById('factCategory').value),
                    animation_type: document.getElementById('factAnimation').value,
                    is_published: document.getElementById('factPublished').checked,
                    tags: document.getElementById('factTags').value.split(',').map(t => t.trim()),
                    updated_at: new Date().toISOString()
                };

                const { error } = await supabase
                    .from('facts')
                    .update(updates)
                    .eq('id', id);

                if (error) throw error;

                showAlert('✅ Fact updated successfully!', 'success');
                document.getElementById('addFactForm').reset();
                document.getElementById('imagePreview').style.display = 'none';
                await loadFacts();

            } catch (error) {
                showAlert(`Error: ${error.message}`, 'error');
            } finally {
                spinner.style.display = 'none';
                btnText.textContent = 'Add Fact';
                document.getElementById('addFactForm').onsubmit = addFact;
            }
        }

        // DELETE FACT
        window.deleteFact = async (id) => {
            if (!confirm('Are you sure you want to delete this fact?')) return;

            try {
                const { error } = await supabase
                    .from('facts')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                showAlert('✅ Fact deleted!', 'success');
                await loadFacts();
            } catch (error) {
                showAlert(`Error: ${error.message}`, 'error');
            }
        };

        // ADD FACT
        document.getElementById('addFactForm').onsubmit = addFact;

        async function addFact(e) {
            e.preventDefault();
            const spinner = document.getElementById('submitSpinner');
            const btnText = document.getElementById('submitBtnText');

            try {
                spinner.style.display = 'inline-block';
                btnText.textContent = 'Adding...';

                const factData = {
                    title: document.getElementById('factTitle').value,
                    description: document.getElementById('factDescription').value,
                    category_id: parseInt(document.getElementById('factCategory').value),
                    animation_type: document.getElementById('factAnimation').value,
                    image_url: document.getElementById('imagePreview').src || null,
                    is_published: document.getElementById('factPublished').checked,
                    tags: document.getElementById('factTags').value.split(',').map(t => t.trim()),
                    views: 0,
                    created_at: new Date().toISOString()
                };

                const { data, error } = await supabase
                    .from('facts')
                    .insert([factData])
                    .select();

                if (error) throw error;

                showAlert('✅ Fact added successfully!', 'success');
                document.getElementById('addFactForm').reset();
                document.getElementById('imagePreview').style.display = 'none';
                await loadFacts();

            } catch (error) {
                showAlert(`Error: ${error.message}`, 'error');
            } finally {
                spinner.style.display = 'none';
                btnText.textContent = 'Add Fact';
            }
        }

        // IMAGE UPLOAD
        const imageUpload = document.getElementById('imageUpload');
        imageUpload.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                try {
                    const fileName = `${Date.now()}-${file.name.replace(/\s+/g, '-')}`;
                    const { data, error } = await supabase.storage
                        .from('facts-images')
                        .upload(`uploads/${fileName}`, file);

                    if (error) throw error;

                    const { data: { publicUrl } } = supabase.storage
                        .from('facts-images')
                        .getPublicUrl(`uploads/${fileName}`);

                    document.getElementById('imagePreview').src = publicUrl;
                    document.getElementById('imagePreview').style.display = 'block';
                    showAlert('✅ Image uploaded!', 'success');
                } catch (error) {
                    showAlert(`Upload error: ${error.message}`, 'error');
                }
            };
            input.click();
        });

        // Drag and drop
        imageUpload.addEventListener('dragover', (e) => {
            e.preventDefault();
            imageUpload.classList.add('dragover');
        });

        imageUpload.addEventListener('dragleave', () => {
            imageUpload.classList.remove('dragover');
        });

        imageUpload.addEventListener('drop', async (e) => {
            e.preventDefault();
            imageUpload.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (!file) return;

            try {
                const fileName = `${Date.now()}-${file.name.replace(/\s+/g, '-')}`;
                const { data, error } = await supabase.storage
                    .from('facts-images')
                    .upload(`uploads/${fileName}`, file);

                if (error) throw error;

                const { data: { publicUrl } } = supabase.storage
                    .from('facts-images')
                    .getPublicUrl(`uploads/${fileName}`);

                document.getElementById('imagePreview').src = publicUrl;
                document.getElementById('imagePreview').style.display = 'block';
                showAlert('✅ Image uploaded!', 'success');
            } catch (error) {
                showAlert(`Upload error: ${error.message}`, 'error');
            }
        });

        // ADD CATEGORY
        document.getElementById('addCategoryForm').onsubmit = async (e) => {
            e.preventDefault();

            try {
                const slug = document.getElementById('categoryName').value
                    .toLowerCase()
                    .replace(/[^a-z0-9]+/g, '-');

                const { error } = await supabase
                    .from('categories')
                    .insert([{
                        name: document.getElementById('categoryName').value,
                        emoji: document.getElementById('categoryEmoji').value,
                        description: document.getElementById('categoryDescription').value,
                        slug: slug
                    }]);

                if (error) throw error;

                showAlert('✅ Category added!', 'success');
                document.getElementById('addCategoryForm').reset();
                await loadCategories();
            } catch (error) {
                showAlert(`Error: ${error.message}`, 'error');
            }
        };

        // LOAD CATEGORIES TABLE
        async function loadCategoriesTable() {
            const table = document.getElementById('categoriesTable');

            try {
                const { data: categoriesWithCounts, error } = await supabase
                    .from('categories')
                    .select(`
                        id,
                        name,
                        emoji,
                        facts:facts(count)
                    `);

                if (error) throw error;

                table.innerHTML = categoriesWithCounts.map(cat => `
                    <tr>
                        <td>${cat.emoji} ${cat.name}</td>
                        <td>${cat.facts.length || 0}</td>
                        <td>
                            <button class="btn btn-small" onclick="editCategory(${cat.id})">Edit</button>
                            <button class="btn btn-small btn-danger" onclick="deleteCategory(${cat.id})">Delete</button>
                        </td>
                    </tr>
                `).join('');
            } catch (error) {
                showAlert(`Error: ${error.message}`, 'error');
            }
        }

        window.deleteCategory = async (id) => {
            if (!confirm('Delete category and all its facts?')) return;

            try {
                const { error } = await supabase
                    .from('categories')
                    .delete()
                    .eq('id', id);

                if (error) throw error;
                showAlert('✅ Category deleted!', 'success');
                await loadCategories();
                await loadFacts();
            } catch (error) {
                showAlert(`Error: ${error.message}`, 'error');
            }
        };

        // SEARCH & FILTER
        document.getElementById('searchFacts').addEventListener('input', renderFactsTable);
        document.getElementById('filterCategory').addEventListener('change', renderFactsTable);

        // ANALYTICS
        async function loadAnalytics() {
            try {
                const { count: factsCount } = await supabase
                    .from('facts')
                    .select('*', { count: 'exact', head: true });

                const { count: categoriesCount } = await supabase
                    .from('categories')
                    .select('*', { count: 'exact', head: true });

                const { data: topFacts } = await supabase
                    .from('facts')
                    .select('title, views')
                    .order('views', { ascending: false })
                    .limit(10);

                const totalViews = (topFacts || []).reduce((sum, f) => sum + (f.views || 0), 0);

                document.getElementById('statFacts').textContent = factsCount || 0;
                document.getElementById('statCategories').textContent = categoriesCount || 0;
                document.getElementById('statViews').textContent = totalViews;

                const topTable = document.getElementById('topFactsTable');
                topTable.innerHTML = (topFacts || []).map(f => `
                    <tr>
                        <td>${f.title}</td>
                        <td>${f.views || 0}</td>
                    </tr>
                `).join('');
            } catch (error) {
                showAlert(`Error loading analytics: ${error.message}`, 'error');
            }
        }

        // SHOW ALERT
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = `alert ${type} show`;
            setTimeout(() => alert.classList.remove('show'), 5000);
        }
    </script>
</body>
</html>
